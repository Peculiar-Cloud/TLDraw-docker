name: Bug Report
description: Report a reproducible problem.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include private room contents, uploaded assets, secrets, or tldraw license keys.
  - type: input
    id: version
    attributes:
      label: Image Tag or Commit
      placeholder: ghcr.io/peculiar-cloud/tldraw-docker:latest
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Docker, Compose, reverse proxy, browser, and host details.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
