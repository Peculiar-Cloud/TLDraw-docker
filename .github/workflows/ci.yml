name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.12.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26.5.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  container:
    name: Container checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          load: true
          tags: tldraw-docker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tldraw-docker:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Smoke test
        run: |
          docker run --rm -d --name tldraw-docker-smoke -p 5858:5858 tldraw-docker:ci
          trap 'docker rm -f tldraw-docker-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5858/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs tldraw-docker-smoke
          exit 1
